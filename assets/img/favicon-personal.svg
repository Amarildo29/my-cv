<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AK favicon">
  <defs>
    <style>
      .bg {
        fill: #3674b5;
      }
      .mark {
        fill: #ffffff;
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 31px;
        font-weight: 800;
        letter-spacing: -1px;
      }
      .frame {
        fill: none;
        stroke: rgba(255, 255, 255, 0.32);
        stroke-width: 2;
      }
      @media (prefers-color-scheme: dark) {
        .bg {
          fill: #5b91cc;
        }
      }
    </style>
  </defs>
  <rect class="bg" x="4" y="4" width="56" height="56" rx="14" />
  <rect class="frame" x="5" y="5" width="54" height="54" rx="13" />
  <text class="mark" x="32" y="43" text-anchor="middle">AK</text>
</svg>
